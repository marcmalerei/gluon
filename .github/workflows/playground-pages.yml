name: Playground Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/playground/**"
      - "packages/compiler/**"
      - "packages/language-server/**"
      - "packages/reactivity/**"
      - "packages/vite/**"
      - "src/**"
      - ".github/workflows/playground-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}playground/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build:playground
      - run: mkdir -p .pages/playground && cp -R examples/playground/dist/. .pages/playground/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .pages
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

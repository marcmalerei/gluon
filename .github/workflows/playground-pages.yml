name: Gluon Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/playground/**"
      - "docs-site/**"
      - "docs/**"
      - "package-contract.json"
      - "typedoc.json"
      - "tsconfig.typedoc.json"
      - "scripts/build-docs.mjs"
      - "scripts/validate-docs.mjs"
      - "package.json"
      - "package-lock.json"
      - "packages/**"
      - "src/**"
      - ".github/workflows/playground-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build:core
      - run: npm run build:compiler
      - run: npm run build:vite
      - run: npm run build:playground
      - run: npm run build:docs
      - run: npm run typecheck:docs
      - run: node scripts/validate-docs.mjs
      - run: mkdir -p .pages/playground && cp -R docs-site/dist/. .pages/ && cp -R examples/playground/dist/. .pages/playground/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .pages
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

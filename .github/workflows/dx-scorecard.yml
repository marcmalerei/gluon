name: DX Scorecard

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dx-scorecard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  automated-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.2
          cache: npm
      - run: npm ci --ignore-scripts --legacy-peer-deps
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run build
      - run: npm run benchmark:dx -- --output=.tmp/dx-scorecard/${{ github.sha }}.json
      - name: Retain raw automated evidence
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: dx-scorecard-${{ github.sha }}
          path: .tmp/dx-scorecard
          retention-days: 90
          if-no-files-found: error
